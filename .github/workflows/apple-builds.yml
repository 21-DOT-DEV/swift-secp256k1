name: Apple Platforms

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ios:
    name: iOS
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - name: Build for iOS
        run: |
          xcrun xcodebuild \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            build \
            -scheme swift-secp256k1-Package \
            -destination generic/platform=iOS

  tvos:
    name: tvOS
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - name: Build for tvOS
        run: |
          xcrun xcodebuild \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            build \
            -scheme swift-secp256k1-Package \
            -destination generic/platform=tvOS

  watchos:
    name: watchOS
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - name: Build for watchOS
        run: |
          xcrun xcodebuild \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            build \
            -scheme swift-secp256k1-Package \
            -destination generic/platform=watchOS

  visionos:
    name: visionOS
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - name: Build for visionOS
        run: |
          xcrun xcodebuild \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            build \
            -scheme swift-secp256k1-Package \
            -destination generic/platform=visionOS

  docc:
    name: DocC Validation
    runs-on: macos-26
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.4.app/Contents/Developer
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Validate P256K DocC
        run: swift package generate-documentation --target P256K --analyze --warnings-as-errors
      - name: Validate ZKP DocC
        run: swift package generate-documentation --target ZKP --analyze --warnings-as-errors
