# .github/workflows/benchmark-pr.yml
#
# Fetches the cached main baseline, runs benchmarks only on the PR
# branch, and compares. Cuts CI time roughly in half.

name: Benchmark PR Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  compare:
    runs-on: ubuntu-latest
    container:
      image: swift:6.3.0

    steps:
      - name: Install dependencies
        run: apt-get update && apt-get install -y libjemalloc-dev gh
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Checkout PR branch
        uses: actions/checkout@v6

      # ── Find the run ID of the latest successful main baseline ──
      - name: Find main baseline run
        id: find-run
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          run_id=$(gh run list \
            --repo "$REPO" \
            --workflow=benchmark-main.yml \
            --branch=main \
            --status=success \
            --limit=1 \
            --json=databaseId \
            --jq='.[0].databaseId')
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"

      # ── Fetch the latest main baseline ──
      - name: Download main baseline
        id: download-baseline
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: main-benchmark-baseline
          path: Projects/.benchmarkBaselines
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.find-run.outputs.run_id }}

      # ── Run benchmarks on the PR branch only ──
      - name: Benchmark PR branch
        working-directory: Projects
        run: |
          swift package --allow-writing-to-package-directory \
            benchmark baseline update pr --no-progress

      # ── Compare: continue-on-error so comment always posts ──
      - name: Compare main → PR
        id: compare
        if: steps.download-baseline.outcome == 'success'
        continue-on-error: true
        working-directory: Projects
        run: |
          swift package benchmark baseline compare main pr \
            --no-progress --format markdown > /tmp/benchmark-comparison.md

      # ── Build comment body into a temp file (avoids UTF-8 variable issues) ──
      - name: Build PR comment
        if: steps.download-baseline.outcome == 'success'
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMPARE_OUTCOME: ${{ steps.compare.outcome }}
        run: |
          {
            echo "### Benchmark Comparison: \`main\` → PR"
            echo ""
            if [ "$COMPARE_OUTCOME" = "success" ]; then
              echo "✅ No regressions detected. [View run]($RUN_URL)"
            else
              echo "⚠️ Regressions detected. [View run]($RUN_URL)"
            fi
            echo ""
            cat /tmp/benchmark-comparison.md
          } > /tmp/pr-comment.md

      # ── Post or update the PR comment ──
      - name: Post PR comment
        if: steps.download-baseline.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if ! gh issue comment "$PR_NUMBER" --edit-last --body-file /tmp/pr-comment.md 2>/dev/null; then
            gh issue comment "$PR_NUMBER" --body-file /tmp/pr-comment.md
          fi

      # ── Fail the job if regressions were detected ──
      - name: Fail on regression
        if: steps.download-baseline.outcome == 'success' && steps.compare.outcome == 'failure'
        run: exit 2
