name: Check Subtree Updates

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions: {}

jobs:
  check:
    name: Check for updates
    runs-on: ubuntu-slim
    permissions:
      contents: write
      pull-requests: write
      actions: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6

      - name: Download subtree binary
        run: |
          SUBTREE_VERSION="0.0.8"
          gh release download "${SUBTREE_VERSION}" \
            -R 21-DOT-DEV/subtree \
            -p "subtree_linux_x86_64" \
            -D /usr/local/bin
          mv /usr/local/bin/subtree_linux_x86_64 /usr/local/bin/subtree
          chmod +x /usr/local/bin/subtree

      - name: Check for updates and dispatch
        run: |
          # Run update check — exit code 5 means updates available
          REPORT=$(subtree update --report --json --all 2>/dev/null) || EXIT_CODE=$?
          if [ "${EXIT_CODE:-0}" -eq 0 ]; then
            echo "✅ All subtrees up to date"
            exit 0
          fi
          if [ "${EXIT_CODE:-0}" -ne 5 ]; then
            echo "❌ Unexpected exit code: ${EXIT_CODE}"
            exit 1
          fi

          # Open PR limit — safety cap before processing
          OPEN_COUNT=$(gh pr list --search "head:subtree/" --state open \
            --json number --jq 'length')
          MAX_OPEN_PRS=5

          # Process each outdated subtree
          echo "$REPORT" | jq -c '.[] | select(.status == "behind")' | while read -r entry; do
            NAME=$(echo "$entry" | jq -r '.name')
            BRANCH_NAME=$(echo "$entry" | jq -r '.branch_name')

            # PR limit check
            if [ "$OPEN_COUNT" -ge "$MAX_OPEN_PRS" ]; then
              echo "⚠️ Open PR limit ($MAX_OPEN_PRS) reached, skipping $NAME"
              continue
            fi

            # Stale + conflict PR handling
            EXISTING=$(gh pr list --search "head:subtree/${NAME}-" --state open \
              --json number,headRefName,mergeable --jq '.[0]')
            if [ -n "$EXISTING" ]; then
              OLD_BRANCH=$(echo "$EXISTING" | jq -r '.headRefName')
              PR_NUMBER=$(echo "$EXISTING" | jq -r '.number')
              MERGEABLE=$(echo "$EXISTING" | jq -r '.mergeable')

              if [ "$OLD_BRANCH" = "$BRANCH_NAME" ] && [ "$MERGEABLE" != "CONFLICTING" ]; then
                echo "✅ PR #${PR_NUMBER} already targets latest for $NAME, skipping"
                continue
              fi

              if [ "$OLD_BRANCH" = "$BRANCH_NAME" ]; then
                gh pr close "$PR_NUMBER" \
                  --comment "Recreating due to merge conflicts with \`main\`"
              else
                gh pr close "$PR_NUMBER" \
                  --comment "Superseded by newer upstream version"
              fi
              git push origin --delete "$OLD_BRANCH" 2>/dev/null || true
            fi

            # Dispatch update workflow — only subtree_name needed
            echo "📦 Dispatching update for $NAME"
            gh workflow run update-subtree.yml --field subtree_name="$NAME"
          done
