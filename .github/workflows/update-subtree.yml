name: Update Subtree

on:
  workflow_dispatch:
    inputs:
      subtree_name:
        description: 'Name of subtree to update (e.g., secp256k1)'
        required: true
        type: string

permissions: {}

jobs:
  update:
    name: Update ${{ inputs.subtree_name }}
    runs-on: macos-26
    permissions: {}
    env:
      GH_TOKEN: ${{ secrets.BOT_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.BOT_TOKEN }}

      - name: Query CLI for pre-computed fields
        id: report
        env:
          SUBTREE_NAME: ${{ inputs.subtree_name }}
        run: |
          # Write JSON to temp file to avoid UTF-8 corruption in shell $() capture
          REPORT_FILE=$(mktemp)
          STDERR_FILE=$(mktemp)

          EXIT_CODE=0
          swift package --allow-writing-to-package-directory \
            --allow-network-connections all \
            subtree update --report --json "$SUBTREE_NAME" \
            > "$REPORT_FILE" 2>"$STDERR_FILE" || EXIT_CODE=$?

          # Surface errors for debugging
          if [ "$EXIT_CODE" -ne 0 ] && [ "$EXIT_CODE" -ne 5 ]; then
            echo "::warning::subtree report exited with code $EXIT_CODE"
            cat "$STDERR_FILE" >&2
          fi

          # Validate JSON before parsing
          if ! jq empty "$REPORT_FILE" 2>/dev/null; then
            echo "::error::Report output is not valid JSON"
            echo "stdout:" && cat "$REPORT_FILE"
            echo "stderr:" && cat "$STDERR_FILE" >&2
            rm -f "$REPORT_FILE" "$STDERR_FILE"
            exit 1
          fi

          BRANCH_NAME=$(jq -r '.[0].branch_name // empty' "$REPORT_FILE")

          if [ -z "$BRANCH_NAME" ]; then
            echo "No update available for $SUBTREE_NAME"
            rm -f "$REPORT_FILE" "$STDERR_FILE"
            exit 0
          fi

          {
            echo "branch_name=$BRANCH_NAME"
            echo "pr_title=$(jq -r '.[0].pr_title' "$REPORT_FILE")"
            echo "latest_tag=$(jq -r '.[0].latest_tag // empty' "$REPORT_FILE")"
            echo "remote=$(jq -r '.[0].remote' "$REPORT_FILE")"
          } >> "$GITHUB_OUTPUT"

          # PR body may be multiline — use delimiter
          {
            echo "pr_body<<EOF"
            jq -r '.[0].pr_body' "$REPORT_FILE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          rm -f "$REPORT_FILE" "$STDERR_FILE"

      - name: Check for existing PR
        if: steps.report.outputs.branch_name
        id: existing
        env:
          BRANCH_NAME: ${{ steps.report.outputs.branch_name }}
        run: |
          COUNT=$(gh pr list --head "$BRANCH_NAME" --state open --json number --jq 'length')
          if [ "$COUNT" -gt 0 ]; then
            echo "PR already exists for $BRANCH_NAME, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create branch
        if: steps.report.outputs.branch_name && steps.existing.outputs.skip != 'true'
        env:
          BRANCH_NAME: ${{ steps.report.outputs.branch_name }}
        run: git checkout -b "$BRANCH_NAME"

      - name: Configure git identity
        if: steps.report.outputs.branch_name && steps.existing.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Clean stale extractions
        if: steps.report.outputs.branch_name && steps.existing.outputs.skip != 'true'
        env:
          SUBTREE_NAME: ${{ inputs.subtree_name }}
        run: |
          swift package --allow-writing-to-package-directory \
            subtree extract --clean --name "$SUBTREE_NAME"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore: clean stale extractions for $SUBTREE_NAME"
          fi

      - name: Debug state before update
        if: steps.report.outputs.branch_name && steps.existing.outputs.skip != 'true'
        env:
          SUBTREE_NAME: ${{ inputs.subtree_name }}
        run: |
          echo "::group::subtree.yaml config"
          grep -A6 "name: $SUBTREE_NAME" subtree.yaml || echo "not found"
          echo "::endgroup::"

          echo "::group::git-subtree trailers (reachable from HEAD)"
          git log --grep="^git-subtree-dir:" --format="%H %s" -5
          echo "---"
          LATEST=$(git log --grep="^git-subtree-dir:" --format="%H" -1)
          if [ -n "$LATEST" ]; then
            git log --format="%B" "$LATEST" -1 | grep "git-subtree-"
          else
            echo "no trailers found"
          fi
          echo "::endgroup::"

          echo "::group::git log (last 5 first-parent)"
          git log --first-parent --oneline -5
          echo "::endgroup::"

          echo "::group::working tree status"
          git status --short | head -20
          echo "::endgroup::"

      - name: Run subtree update
        if: steps.report.outputs.branch_name && steps.existing.outputs.skip != 'true'
        id: update
        env:
          SUBTREE_NAME: ${{ inputs.subtree_name }}
        run: |
          STDOUT_FILE=$(mktemp)
          STDERR_FILE=$(mktemp)

          EXIT_CODE=0
          swift package --allow-network-connections all \
            --allow-writing-to-package-directory \
            subtree update "$SUBTREE_NAME" \
            > "$STDOUT_FILE" 2>"$STDERR_FILE" || EXIT_CODE=$?

          cat "$STDOUT_FILE"
          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "::error::subtree update failed with exit code $EXIT_CODE"
            echo "::group::stdout"
            cat "$STDOUT_FILE"
            echo "::endgroup::"
            echo "::group::stderr"
            cat "$STDERR_FILE"
            echo "::endgroup::"
            rm -f "$STDOUT_FILE" "$STDERR_FILE"
            exit "$EXIT_CODE"
          fi
          cat "$STDERR_FILE" >&2
          rm -f "$STDOUT_FILE" "$STDERR_FILE"

      - name: Debug state after update
        if: always() && steps.report.outputs.branch_name && steps.existing.outputs.skip != 'true'
        run: |
          echo "::group::git log after update (last 8 first-parent)"
          git log --first-parent --oneline -8
          echo "::endgroup::"

          echo "::group::git-subtree trailers after update"
          git log --grep="^git-subtree-dir:" --format="%H %s" -5
          echo "::endgroup::"

          echo "::group::subtree.yaml after update"
          grep -A6 "name: ${{ inputs.subtree_name }}" subtree.yaml || echo "not found"
          echo "::endgroup::"

          echo "::group::working tree status"
          git status --short | head -20
          echo "::endgroup::"

      - name: Run subtree extract
        if: steps.update.outcome == 'success' && steps.existing.outputs.skip != 'true'
        env:
          SUBTREE_NAME: ${{ inputs.subtree_name }}
        run: |
          swift package --allow-writing-to-package-directory \
            subtree extract --name "$SUBTREE_NAME"

      - name: Squash, commit, and push
        if: steps.update.outcome == 'success' && steps.existing.outputs.skip != 'true'
        id: commit
        env:
          PR_TITLE: ${{ steps.report.outputs.pr_title }}
          BRANCH_NAME: ${{ steps.report.outputs.branch_name }}
        run: |
          # Stage any remaining changes (extracted files, config)
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "stage extracted files"
          fi

          # Check if branch diverged from main
          COMMIT_COUNT=$(git rev-list --count main..HEAD)
          if [ "$COMMIT_COUNT" -eq 0 ]; then
            echo "No changes after update + extract, skipping PR"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Extract git-subtree trailers from branch commits (before squashing)
          TRAILERS=$(git log main..HEAD --format="%B" | grep "^git-subtree-" || true)

          # Squash all branch commits into one to preserve trailers on GitHub squash merge
          if [ "$COMMIT_COUNT" -gt 1 ]; then
            git reset --soft main
            if [ -n "$TRAILERS" ]; then
              printf '%s\n\n%s\n' "$PR_TITLE" "$TRAILERS" | git commit -F -
            else
              git commit -m "$PR_TITLE"
            fi
          else
            # Single commit — amend with PR title + trailers if needed
            if [ -n "$TRAILERS" ]; then
              printf '%s\n\n%s\n' "$PR_TITLE" "$TRAILERS" | git commit --amend -F -
            else
              git commit --amend -m "$PR_TITLE"
            fi
          fi

          git push origin "$BRANCH_NAME"

      - name: Create PR
        if: steps.update.outcome == 'success' && steps.existing.outputs.skip != 'true' && steps.commit.outputs.skip != 'true'
        env:
          LATEST_TAG: ${{ steps.report.outputs.latest_tag }}
          REMOTE: ${{ steps.report.outputs.remote }}
          PR_BODY: ${{ steps.report.outputs.pr_body }}
          PR_TITLE: ${{ steps.report.outputs.pr_title }}
          BRANCH_NAME: ${{ steps.report.outputs.branch_name }}
        run: |
          # Append upstream release notes if tag-based
          if [ -n "$LATEST_TAG" ]; then
            OWNER_REPO=$(echo "$REMOTE" | sed 's|https://github.com/||;s|\.git$||')
            RELEASE_NOTES=$(gh release view "$LATEST_TAG" -R "$OWNER_REPO" \
              --json body --jq '.body' 2>/dev/null || echo "")
            if [ -n "$RELEASE_NOTES" ]; then
              PR_BODY=$(printf '%s\n\n### Upstream Release Notes\n%s' "$PR_BODY" "$RELEASE_NOTES")
            fi
          fi

          gh pr create \
            --title "$PR_TITLE" \
            --body "$PR_BODY" \
            --base main \
            --head "$BRANCH_NAME" \
            --label "dependencies"
